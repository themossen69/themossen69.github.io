---
layout: null
---

<!doctype html>
<html lang="ca">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>themossen69 - notícies</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/styles.css">
</head>

<body>
    <header class="site-header">
        <h1 class="site-title">xX_notícies_Xx</h1>
    </header>

    <main class="container" role="main">
        <section class="news-section">

            {% assign posts = site.posts | sort: "date" | reverse %}

            {% for post in posts %}
            <div class="news-item">
                <button class="news-title">
                    {{ post.title }} - {{ post.date | date: "%d/%m/%Y" }}
                </button>

                <div class="news-content">
                    {{ post.content }}
                </div>
            </div>
            {% endfor %}

        </section>
    </main>

    <footer class="site-footer" aria-hidden="true">
        <small>made in dosrius</small>
    </footer>

    <script>
        const newsItems = document.querySelectorAll('.news-item');

        newsItems.forEach(item => {
            const title = item.querySelector('.news-title');
            title.addEventListener('click', () => {
                item.classList.toggle('active');
            });
        });

        // imatges news-content
        document.querySelectorAll('.news-content').forEach(post => {
            const imgs = post.querySelectorAll('img');
            if (imgs.length > 0) {
                const container = document.createElement('div');
                container.className = 'meme-images';
                imgs.forEach(img => container.appendChild(img));
                post.prepend(container); // Les imatges entren al principi
            }
        });
    </script>
</body>

</html>
